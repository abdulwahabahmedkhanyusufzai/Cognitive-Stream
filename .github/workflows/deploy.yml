name: Deploy to Azure Container Apps

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    RESOURCE_GROUP: rc-agenitc-saas
    REGISTRY_NAME: crcognitivestream
    BACKEND_APP_NAME: ca-backend
    FRONTEND_APP_NAME: ca-frontend
    BACKEND_IMAGE_NAME: backend
    FRONTEND_IMAGE_NAME: frontend

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source
              uses: actions/checkout@v4

            - name: Log in to Azure Registry
              uses: azure/docker-login@v1
              with:
                  login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and Push Backend
              run: |
                  docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} ./backend
                  docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

            - name: Build and Push Frontend
              run: |
                  docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.FRONTEND_APP_NAME }}:${{ github.sha }} ./frontend
                  docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.FRONTEND_APP_NAME }}:${{ github.sha }}

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Log in to Azure
              uses: azure/login@v1
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Deploy Backend to Container App
              uses: azure/container-apps-deploy-action@v1
              with:
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  containerAppName: ${{ env.BACKEND_APP_NAME }}
                  imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

            - name: Deploy Frontend to Container App
              uses: azure/container-apps-deploy-action@v1
              with:
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  containerAppName: ${{ env.FRONTEND_APP_NAME }}
                  imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.FRONTEND_APP_NAME }}:${{ github.sha }}
