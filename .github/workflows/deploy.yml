name: Deploy to Azure Container Apps

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

env:
    RESOURCE_GROUP: rg-agentic-saas
    REGISTRY_NAME: rcagenticsaas
    BACKEND_APP_NAME: ba-backend
    FRONTEND_APP_NAME: ba-frontend
    BACKEND_IMAGE_NAME: backend
    FRONTEND_IMAGE_NAME: frontend

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source
              uses: actions/checkout@v4

            - name: Log in to Azure (OIDC)
              uses: azure/login@v1
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Log in to ACR
              run: az acr login --name ${{ env.REGISTRY_NAME }}

            - name: Build and Push Backend
              run: |
                  docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} ./backend
                  docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

            - name: Build and Push Frontend
              run: |
                  docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} ./frontend
                  docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Log in to Azure (OIDC)
              uses: azure/login@v1
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Deploy Backend to Container App
              uses: azure/container-apps-deploy-action@v1
              with:
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  containerAppName: ${{ env.BACKEND_APP_NAME }}
                  acrName: ${{ env.REGISTRY_NAME }}
                  imageToDeploy: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
                  targetPort: 5000
                  ingress: external

            - name: Deploy Frontend to Container App
              uses: azure/container-apps-deploy-action@v1
              with:
                  resourceGroup: ${{ env.RESOURCE_GROUP }}
                  containerAppName: ${{ env.FRONTEND_APP_NAME }}
                  acrName: ${{ env.REGISTRY_NAME }}
                  imageToDeploy: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
                  targetPort: 80
                  ingress: external
