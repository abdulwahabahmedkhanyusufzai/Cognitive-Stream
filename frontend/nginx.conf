server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

location /api/ {
    # 1. Trailing slashes ensure correct path mapping
    proxy_pass https://ba-backend-v2.jollyfield-759e8655.uaenorth.azurecontainerapps.io/;
    proxy_http_version 1.1;

    # 2. SSL & Identity (Crucial for Azure)
    proxy_set_header Host ba-backend-v2.jollyfield-759e8655.uaenorth.azurecontainerapps.io;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # 3. Cookie Forwarding
    # This allows the browser to send cookies TO the backend
    proxy_set_header Cookie $http_cookie;
    # This ensures Nginx passes the Set-Cookie header FROM the backend TO you
    proxy_pass_header Set-Cookie;

    # 4. Handle OPTIONS (Preflight)
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://ba-frontend-v2.jollyfield-759e8655.uaenorth.azurecontainerapps.io' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since,X-Forwarded-Proto' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Length' 0;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        return 204;
    }

    # 5. Global CORS (ONLY if your Java backend isn't already sending them)
    # If Java already sends these, adding them here will cause a "Duplicate Header" error.
    add_header 'Access-Control-Allow-Origin' 'https://ba-frontend-v2.jollyfield-759e8655.uaenorth.azurecontainerapps.io' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # 6. Proxy Headers
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
}