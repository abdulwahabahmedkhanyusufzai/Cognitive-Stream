<div class="fixed top-0 left-0 right-0 z-[100] border-b border-white/5 bg-nebula-dark/80 backdrop-blur-xl">
  <div class="px-4 h-16 flex items-center justify-between gap-4 lg:gap-8">

    <!-- LEFT: Logo & Brand -->
    <div class="flex items-center gap-4 min-w-fit">
      <button (click)="toggleMobileMenu()" class="p-2 hover:bg-white/5 rounded-full lg:hidden text-gray-400">
        <lucide-icon name="menu" class="size-5"></lucide-icon>
      </button>

      <a routerLink="/" class="flex items-center space-x-2 group">
        <div
          class="w-8 h-8 bg-gradient-premium rounded-lg flex items-center justify-center shadow-lg shadow-nebula-violet/20">
          <span class="text-white font-black text-lg">C</span>
        </div>
        <div class="hidden sm:flex flex-col">
          <span class="text-white font-bold text-xs tracking-wider uppercase leading-none">Cognitive</span>
          <span class="text-nebula-cyan font-bold text-[8px] tracking-[0.2em] uppercase mt-0.5">Stream</span>
        </div>
      </a>
    </div>

    <!-- CENTER: Search Bar (YouTube Style) -->
    <div class="flex-grow max-w-2xl hidden md:flex items-center h-10">
      <div
        class="flex flex-grow bg-nebula-surface border border-nebula-border rounded-l-full overflow-hidden focus-within:border-nebula-violet transition-colors">
        <input type="text" placeholder="Search for movies, actors, or nodes..."
          class="w-full bg-transparent border-none text-white px-5 py-2 text-sm focus:ring-0 placeholder-gray-600"
          routerLink="/search" />
      </div>
      <button routerLink="/search"
        class="bg-nebula-border border border-l-0 border-nebula-border px-5 h-full rounded-r-full hover:bg-white/10 transition-colors text-gray-400">
        <lucide-icon name="search" class="size-4"></lucide-icon>
      </button>
    </div>

    <!-- RIGHT: Actions -->
    <div class="flex items-center gap-2 sm:gap-4 min-w-fit">
      <div class="md:hidden">
        <button routerLink="/search" class="p-2 hover:bg-white/5 rounded-full text-gray-400">
          <lucide-icon name="search" class="size-5"></lucide-icon>
        </button>
      </div>

      <div class="h-6 w-px bg-white/10 mx-2 hidden sm:block"></div>

      <!-- User Info -->
      <div class="flex items-center gap-3">
        <div class="hidden lg:flex flex-col items-end">
          <span class="text-[10px] font-bold text-white leading-tight">{{ authService.user()?.username }}</span>
          <span class="text-[9px] font-bold text-nebula-cyan tracking-tighter uppercase leading-tight">Elite Node</span>
        </div>

        <div class="relative group/avatar cursor-pointer">
          <img
            [src]="authService.user()?.image || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + authService.user()?.username"
            alt="Avatar"
            class="h-9 w-9 rounded-full object-cover border-2 border-nebula-border group-hover:border-nebula-violet transition-colors" />
        </div>

        <button (click)="logout()"
          class="p-2 rounded-full hover:bg-white/5 text-gray-400 hover:text-red-400 transition-colors" title="Logout">
          <lucide-icon name="log-out" class="size-5"></lucide-icon>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Mobile Menu (The Sidebar style) -->
<div *ngIf="isMobileMenuOpen()" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm lg:hidden"
  (click)="toggleMobileMenu()">
  <div
    class="w-64 h-full bg-nebula-dark border-r border-white/5 p-4 flex flex-col gap-4 animate-in slide-in-from-left duration-300"
    (click)="$event.stopPropagation()">
    <div class="flex items-center gap-4 mb-8">
      <button (click)="toggleMobileMenu()" class="p-2 hover:bg-white/5 rounded-full text-gray-400">
        <lucide-icon name="menu" class="size-5"></lucide-icon>
      </button>
      <div class="flex items-center space-x-2">
        <div class="w-7 h-7 bg-gradient-premium rounded-lg flex items-center justify-center">
          <span class="text-white font-black text-sm">C</span>
        </div>
        <span class="text-white font-bold text-sm tracking-tight uppercase">Cognitive Stream</span>
      </div>
    </div>

    <nav class="flex flex-col gap-1">
      <a routerLink="/"
        class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all"
        (click)="setContentType('movie'); toggleMobileMenu()" [routerLinkActive]="'!bg-nebula-violet/10 !text-white'">
        <lucide-icon name="tv" class="size-5"></lucide-icon>
        <span class="text-sm font-bold">Movies</span>
      </a>
      <a routerLink="/"
        class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all"
        (click)="setContentType('tv'); toggleMobileMenu()" [routerLinkActive]="'!bg-nebula-violet/10 !text-white'">
        <lucide-icon name="star" class="size-5"></lucide-icon>
        <span class="text-sm font-bold">Universe</span>
      </a>
      <a routerLink="/history"
        class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all"
        (click)="toggleMobileMenu()" routerLinkActive="!bg-nebula-violet/10 !text-white">
        <lucide-icon name="clock" class="size-5"></lucide-icon>
        <span class="text-sm font-bold">Trajectory</span>
      </a>
    </nav>
  </div>
</div>
