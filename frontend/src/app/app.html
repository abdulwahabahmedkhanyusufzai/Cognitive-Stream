<!-- PREMIUM ATMOSPHERE SYSTEM -->
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10 bg-nebula-dark" aria-hidden="true">
  <!-- Dynamic Glows -->
  <div
    class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] bg-nebula-violet/10 blur-[140px] rounded-full animate-float">
  </div>
  <div
    class="absolute top-[10%] -right-[20%] w-[60%] h-[60%] bg-nebula-cyan/5 blur-[120px] rounded-full animate-pulse-slow">
  </div>
  <div class="absolute bottom-[-20%] left-[25%] w-[50%] h-[50%] bg-nebula-fuchsia/5 blur-[150px] rounded-full"
    style="animation: float 25s ease-in-out infinite alternate;"></div>

  <!-- Subtle Vignette -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,rgba(5,5,5,0.4)_100%)]"></div>

  <!-- Noise Texture -->
  <div
    class="absolute inset-0 opacity-[0.02] mix-blend-overlay bg-[url('https://grainy-gradients.vercel.app/noise.svg')]">
  </div>
</div>

<div *ngIf="authService.isCheckingAuth(); else content"
  class="h-screen flex items-center justify-center bg-nebula-dark">
  <lucide-icon name="loader" class="animate-spin text-nebula-violet size-10"></lucide-icon>
</div>

<ng-template #content>
  <router-outlet></router-outlet>
  <app-footer></app-footer>
</ng-template>
