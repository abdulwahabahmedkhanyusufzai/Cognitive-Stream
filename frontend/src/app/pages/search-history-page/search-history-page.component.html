<div class="bg-nebula-dark text-white min-h-screen font-sans overflow-x-hidden">
    <div class="h-32"></div>
    <app-navbar></app-navbar>

    <div class="max-w-7xl mx-auto px-8 py-16">
        <header class="flex flex-col space-y-4 mb-20">
            <div class="flex items-center space-x-3 text-xs font-black uppercase tracking-[0.4em] text-gray-500">
                <span class="w-1.5 h-1.5 bg-nebula-cyan rounded-full"></span>
                <span>User Archives</span>
            </div>
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase text-white">
                Mission <span class="text-nebula-violet">Trajectory</span>
            </h1>
        </header>

        @if (searchHistory().length === 0) {
        <div class="flex flex-col items-center justify-center py-32 text-center opacity-30">
            <lucide-icon name="history" class="size-20 mb-6"></lucide-icon>
            <p class="text-xl font-bold uppercase tracking-widest">Logs Empty</p>
            <p class="text-sm">No mission parameters localized in this sector.</p>
        </div>
        } @else {
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            @for (entry of searchHistory(); track entry.id) {
            <div
                class="flex items-center p-4 bg-white/5 border border-white/5 rounded-2xl group hover:bg-white/10 hover:border-white/20 transition-all">
                <img [src]="SMALL_IMG_BASE_URL + entry.image" alt="History"
                    class="size-16 rounded-xl object-cover grayscale group-hover:grayscale-0 transition-all duration-500 ring-1 ring-white/10" />

                <div class="flex-grow ml-6">
                    <h3
                        class="font-bold text-lg text-white group-hover:text-nebula-cyan transition-colors truncate max-w-[200px] md:max-w-xs">
                        {{ entry.title }}</h3>
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-500 mt-1">
                        {{ entry.createdAt | date:'dd MMM yyyy' }}
                    </p>
                </div>

                <div class="flex items-center gap-6">
                    <span
                        class="px-3 py-1 text-[9px] font-black uppercase tracking-widest rounded-full border transition-colors"
                        [ngClass]="{
                            'border-nebula-violet text-nebula-violet bg-nebula-violet/5': entry.searchType === 'movie',
                            'border-nebula-cyan text-nebula-cyan bg-nebula-cyan/5': entry.searchType === 'tv',
                            'border-white/10 text-gray-500': entry.searchType === 'person'
                        }">
                        {{ entry.searchType }}
                    </span>

                    <button (click)="handleDelete(entry)"
                        class="p-3 text-gray-600 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-all">
                        <lucide-icon name="trash" class="size-4"></lucide-icon>
                    </button>
                </div>
            </div>
            }
        </div>
        }
    </div>
</div>
