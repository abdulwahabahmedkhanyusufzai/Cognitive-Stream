<div class="bg-nebula-dark text-white min-h-screen font-sans overflow-x-hidden">
    <app-navbar></app-navbar>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex items-center space-x-4 mb-12">
            <div class="h-10 w-2 bg-nebula-cyan rounded-full shadow-glow"></div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase">Mission <span
                    class="text-nebula-cyan">Trajectory</span></h1>
        </div>

        @if (searchHistory().length === 0) {
        <div class="flex flex-col items-center justify-center h-[50vh] text-center space-y-4">
            <lucide-icon name="history" class="size-16 text-white/5"></lucide-icon>
            <p class="text-2xl font-black text-white/20">LOGS EMPTY</p>
            <p class="text-gray-600">No mission data recorded in this sector yet.</p>
        </div>
        } @else {
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            @for (entry of searchHistory(); track entry.id) {
            <div
                class="bg-white/5 backdrop-blur-xl border border-white/10 p-6 rounded-[32px] flex items-center group hover:bg-white/10 hover:border-nebula-violet/30 transition-all">
                <div class="relative">
                    <div
                        class="absolute -inset-1 bg-nebula-violet/20 blur rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <img [src]="SMALL_IMG_BASE_URL + entry.image" alt="History data"
                        class="size-16 rounded-2xl object-cover relative ring-2 ring-white/10 group-hover:ring-nebula-violet/50 transition-all" />
                </div>

                <div class="flex flex-col ml-6 flex-grow min-w-0">
                    <span class="text-white font-bold text-lg truncate">{{ entry.title }}</span>
                    <span class="text-gray-500 text-xs font-black uppercase tracking-widest mt-1">{{ entry.createdAt |
                        date:'dd MMM yyyy' }}</span>
                </div>

                <div class="flex flex-col items-end gap-3 ml-4">
                    <span class="py-1 px-4 text-[10px] font-black tracking-tighter rounded-lg border uppercase"
                        [class.border-nebula-violet]="entry.searchType === 'movie'"
                        [class.text-nebula-violet]="entry.searchType === 'movie'"
                        [class.bg-nebula-violet/10]="entry.searchType === 'movie'"
                        [class.border-nebula-cyan]="entry.searchType === 'tv'"
                        [class.text-nebula-cyan]="entry.searchType === 'tv'"
                        [class.bg-nebula-cyan/10]="entry.searchType === 'tv'"
                        [class.border-gray-500]="entry.searchType === 'person'"
                        [class.text-gray-500]="entry.searchType === 'person'">
                        {{ entry.searchType }}
                    </span>

                    <button (click)="handleDelete(entry)"
                        class="p-2 text-gray-600 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-all">
                        <lucide-icon name="trash" class="size-4"></lucide-icon>
                    </button>
                </div>
            </div>
            }
        </div>
        }
    </div>
</div>
