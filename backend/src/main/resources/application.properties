# ===============================================================
# Application Metadata
# ===============================================================
spring.application.name=backend
server.port=${PORT:5000}

# Proxy & Networking (Required for Azure/Cloud deployment)
server.forward-headers-strategy=framework
server.tomcat.remote-ip-header=x-forwarded-for
server.tomcat.protocol-header=x-forwarded-proto

# ===============================================================
# Persistence - PostgreSQL
# ===============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/netflix_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate Configuration
# Note: Use 'validate' or 'none' in production to prevent accidental data loss
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection Pooling (HikariCP - Optimized for high throughput)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# ===============================================================
# Security & Integrations
# ===============================================================
# JWT (1 Day Expiration)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# TMDB External API
tmdb.api.key=${TMDB_API_KEY}

# ===============================================================
# Media Storage Configuration
# ===============================================================
app.video.storage-path=${VIDEO_STORAGE_PATH:storage/hls-content}